<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - CRM Platform</title>
    <!-- Use Tailwind CSS via CDN for simple, rapid, and clean styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body class="bg-gray-100 text-gray-800 font-sans leading-normal tracking-normal flex">

    <!-- Sidebar -->
    <div class="bg-slate-900 shadow-xl h-screen w-64 fixed left-0 top-0 overflow-y-auto z-20">
        <div class="px-6 py-6 border-b border-slate-800">
            <h1 class="text-white text-xl font-bold tracking-tight">CRM Platform</h1>
            {% if demo_mode %}
            <span class="mt-2 inline-flex items-center text-[9px] font-bold uppercase tracking-widest bg-amber-500/20 text-amber-400 border border-amber-500/30 px-2 py-0.5 rounded-full">
                <span class="w-1.5 h-1.5 bg-amber-400 rounded-full mr-1.5 animate-pulse"></span>Demo Mode
            </span>
            {% endif %}
        </div>
        <nav class="mt-6">
            <a class="flex items-center mt-1 py-3 px-6 {% if title == 'Dashboard' %}bg-slate-800 text-white border-l-4 border-blue-500{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %} transition-all" href="/">
                <i class="fas fa-th-large w-5 mr-3"></i>
                <span class="font-medium">Dashboard</span>
            </a>
            <a class="flex items-center mt-1 py-3 px-6 {% if title == 'Leads' %}bg-slate-800 text-white border-l-4 border-blue-500{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %} transition-all" href="/leads">
                <i class="fas fa-bullhorn w-5 mr-3"></i>
                <span class="font-medium">Leads</span>
            </a>
            <a class="flex items-center mt-1 py-3 px-6 {% if title == 'Contacts' %}bg-slate-800 text-white border-l-4 border-blue-500{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %} transition-all" href="/contacts">
                <i class="fas fa-users w-5 mr-3"></i>
                <span class="font-medium">Contacts</span>
            </a>
            <a class="flex items-center mt-1 py-3 px-6 {% if title == 'Deals' %}bg-slate-800 text-white border-l-4 border-blue-500{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %} transition-all" href="/deals">
                <i class="fas fa-handshake w-5 mr-3"></i>
                <span class="font-medium">Deals</span>
            </a>
            <a class="flex items-center mt-1 py-3 px-6 {% if title == 'Activities' %}bg-slate-800 text-white border-l-4 border-blue-500{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %} transition-all" href="/activities">
                <i class="fas fa-calendar-alt w-5 mr-3"></i>
                <span class="font-medium">Activities</span>
            </a>
            <a class="flex items-center mt-1 py-3 px-6 {% if title == 'Reports' %}bg-slate-800 text-white border-l-4 border-blue-500{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %} transition-all" href="/dashboard">
                <i class="fas fa-chart-bar w-5 mr-3"></i>
                <span class="font-medium">Reports</span>
            </a>

            <div class="mt-6 mx-4 border-t border-slate-800"></div>
            <p class="text-[10px] font-bold text-slate-600 uppercase tracking-widest px-6 mt-4 mb-1">Support</p>

            <a class="flex items-center mt-1 py-3 px-6 {% if title == 'Help & Onboarding' %}bg-slate-800 text-white border-l-4 border-blue-500{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %} transition-all" href="/help">
                <i class="fas fa-question-circle w-5 mr-3"></i>
                <span class="font-medium">Help Guide</span>
            </a>
            <a class="flex items-center mt-1 py-3 px-6 {% if title == 'SOP' %}bg-slate-800 text-white border-l-4 border-blue-500{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %} transition-all" href="/sop">
                <i class="fas fa-book w-5 mr-3"></i>
                <span class="font-medium">SOP Docs</span>
            </a>

            <div class="mt-6 px-6">
                <a href="/logout" class="flex items-center justify-center w-full bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white py-2 px-4 rounded-lg border border-red-500/20 transition-all font-semibold">
                  <i class="fas fa-sign-out-alt mr-2"></i> Logout
                </a>
            </div>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 ml-64 min-h-screen">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
